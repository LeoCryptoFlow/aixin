upstream aixin_backend {
    server 127.0.0.1:3210;
    keepalive 32;           # 增加长连接池，减少 TCP 握手开销
    keepalive_requests 1000;
    keepalive_timeout 60s;
}

# Gzip 压缩
gzip on;
gzip_types application/json text/plain application/javascript text/css;
gzip_min_length 256;
gzip_vary on;
gzip_comp_level 4;          # 4 是速度/压缩比最佳平衡点（默认1太低）

server {
    listen 80;
    server_name aixin.chat www.aixin.chat;

    # HTTP 强制跳转 HTTPS
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name aixin.chat www.aixin.chat;

    # SSL 证书
    ssl_certificate /etc/nginx/ssl/aixin.chat_bundle.pem;
    ssl_certificate_key /etc/nginx/ssl/aixin.chat.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_prefer_server_ciphers on;


    # TCP 优化
    tcp_nodelay on;
    tcp_nopush on;

    # 官网静态页面
    location / {
        root /root/aixin/website;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # API 代理
    location /api {
        proxy_pass http://aixin_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";   # 启用长连接复用

        # 超时设置（POST 请求需要更长时间）
        proxy_connect_timeout 5s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # 缓冲优化（8KB first buffer，足够大多数 JSON 响应一次传完）
        proxy_buffering on;
        proxy_buffer_size 8k;
        proxy_buffers 8 8k;
        proxy_busy_buffers_size 16k;

        # POST body
        client_max_body_size 10m;

        # GET 列表接口缓存响应头（让客户端/CDN 知道可缓存）
        add_header Cache-Control "no-cache" always;
        add_header X-Response-Time $upstream_response_time always;
    }


    # 健康检查也代理到后端
    location /health {
        proxy_pass http://aixin_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_connect_timeout 3s;
        proxy_read_timeout 5s;
    }

    # WebSocket 代理
    location /ws {
        proxy_pass http://aixin_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400;
    }

    location /socket.io {
        proxy_pass http://aixin_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400;
    }
}
